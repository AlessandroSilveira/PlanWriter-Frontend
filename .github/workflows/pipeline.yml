name: PlanWriter Frontend Pipeline

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      target:
        description: "Ambiente de deploy"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      action:
        description: "Acao do deploy"
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback
      deploy_ref:
        description: "Ref para deploy (branch/tag/SHA). Vazio usa branch atual."
        required: false
      rollback_ref:
        description: "Ref para rollback (branch/tag/SHA). Obrigatorio em rollback."
        required: false

concurrency:
  group: planwriter-frontend-main-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Frontend
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'rollback'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  smoke_e2e:
    name: Smoke E2E
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'rollback'
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  deploy_staging:
    name: Deploy Staging
    runs-on:
      - self-hosted
      - macOS
      - deploy
    needs:
      - build
      - smoke_e2e
    if: (github.event_name == 'push' && github.ref == 'refs/heads/staging') || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy' && github.event.inputs.target == 'staging')
    environment: staging
    env:
      DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
      DEPLOY_REF_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_ref || '' }}
      DEFAULT_REF: ${{ github.ref_name }}
      TARGET_ENV: staging
      MSSQL_SA_PASSWORD_SECRET: ${{ secrets.MSSQL_SA_PASSWORD }}
      JWT_KEY_SECRET: ${{ secrets.JWT_KEY }}

    steps:
      - name: Validate deploy root
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_ROOT:-}" ]; then
            echo "Secret DEPLOY_ROOT nao configurado."
            exit 1
          fi
          if [ -z "${MSSQL_SA_PASSWORD_SECRET:-}" ]; then
            echo "Secret MSSQL_SA_PASSWORD nao configurado."
            exit 1
          fi
          if [ -z "${JWT_KEY_SECRET:-}" ]; then
            echo "Secret JWT_KEY nao configurado."
            exit 1
          fi

      - name: Update repositories and deploy
        run: |
          set -euo pipefail

          if [ -n "${MSSQL_SA_PASSWORD_SECRET:-}" ]; then
            export MSSQL_SA_PASSWORD="$MSSQL_SA_PASSWORD_SECRET"
          fi
          if [ -n "${JWT_KEY_SECRET:-}" ]; then
            export JWT_KEY="$JWT_KEY_SECRET"
          fi

          BACKEND_DIR="$DEPLOY_ROOT/PlanWriter"
          FRONTEND_DIR="$DEPLOY_ROOT/PlanWriter-Frontend"

          if [ ! -d "$BACKEND_DIR/.git" ]; then
            echo "Repositorio backend nao encontrado em: $BACKEND_DIR"
            exit 1
          fi

          if [ ! -d "$FRONTEND_DIR/.git" ]; then
            echo "Repositorio frontend nao encontrado em: $FRONTEND_DIR"
            exit 1
          fi

          checkout_ref() {
            local repo_dir="$1"
            local ref="$2"

            git -C "$repo_dir" fetch --all --tags --prune

            local default_branch
            default_branch="$(git -C "$repo_dir" symbolic-ref --quiet --short refs/remotes/origin/HEAD | sed 's#^origin/##')"
            if [ -z "$default_branch" ]; then
              default_branch="main"
            fi

            if git -C "$repo_dir" show-ref --verify --quiet "refs/remotes/origin/$ref"; then
              git -C "$repo_dir" fetch origin "$ref"
              git -C "$repo_dir" checkout -B "$ref" "origin/$ref"
            elif git -C "$repo_dir" rev-parse --verify --quiet "$ref^{commit}" >/dev/null; then
              git -C "$repo_dir" checkout --detach "$ref"
            else
              echo "Ref '$ref' nao encontrada em $(basename "$repo_dir"). Usando '$default_branch'."
              git -C "$repo_dir" fetch origin "$default_branch"
              git -C "$repo_dir" checkout -B "$default_branch" "origin/$default_branch"
            fi
          }

          TARGET_REF="$DEPLOY_REF_INPUT"
          if [ -z "$TARGET_REF" ]; then
            TARGET_REF="$DEFAULT_REF"
          fi

          echo "Ambiente: $TARGET_ENV"
          echo "Acao: deploy"
          echo "Ref: $TARGET_REF"

          checkout_ref "$BACKEND_DIR" "$TARGET_REF"
          checkout_ref "$FRONTEND_DIR" "$TARGET_REF"

          bash "$BACKEND_DIR/scripts/deploy/deploy-target.sh" "$TARGET_ENV" "$BACKEND_DIR"

  deploy_production:
    name: Deploy Production
    runs-on:
      - self-hosted
      - macOS
      - deploy
    needs:
      - build
      - smoke_e2e
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy' && github.event.inputs.target == 'production'
    environment: production
    env:
      DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
      DEPLOY_REF_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_ref || '' }}
      DEFAULT_REF: ${{ github.ref_name }}
      TARGET_ENV: production
      MSSQL_SA_PASSWORD_SECRET: ${{ secrets.MSSQL_SA_PASSWORD }}
      JWT_KEY_SECRET: ${{ secrets.JWT_KEY }}

    steps:
      - name: Validate deploy root
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_ROOT:-}" ]; then
            echo "Secret DEPLOY_ROOT nao configurado."
            exit 1
          fi
          if [ -z "${MSSQL_SA_PASSWORD_SECRET:-}" ]; then
            echo "Secret MSSQL_SA_PASSWORD nao configurado."
            exit 1
          fi
          if [ -z "${JWT_KEY_SECRET:-}" ]; then
            echo "Secret JWT_KEY nao configurado."
            exit 1
          fi

      - name: Update repositories and deploy
        run: |
          set -euo pipefail

          if [ -n "${MSSQL_SA_PASSWORD_SECRET:-}" ]; then
            export MSSQL_SA_PASSWORD="$MSSQL_SA_PASSWORD_SECRET"
          fi
          if [ -n "${JWT_KEY_SECRET:-}" ]; then
            export JWT_KEY="$JWT_KEY_SECRET"
          fi

          BACKEND_DIR="$DEPLOY_ROOT/PlanWriter"
          FRONTEND_DIR="$DEPLOY_ROOT/PlanWriter-Frontend"

          if [ ! -d "$BACKEND_DIR/.git" ]; then
            echo "Repositorio backend nao encontrado em: $BACKEND_DIR"
            exit 1
          fi

          if [ ! -d "$FRONTEND_DIR/.git" ]; then
            echo "Repositorio frontend nao encontrado em: $FRONTEND_DIR"
            exit 1
          fi

          checkout_ref() {
            local repo_dir="$1"
            local ref="$2"

            git -C "$repo_dir" fetch --all --tags --prune

            local default_branch
            default_branch="$(git -C "$repo_dir" symbolic-ref --quiet --short refs/remotes/origin/HEAD | sed 's#^origin/##')"
            if [ -z "$default_branch" ]; then
              default_branch="main"
            fi

            if git -C "$repo_dir" show-ref --verify --quiet "refs/remotes/origin/$ref"; then
              git -C "$repo_dir" fetch origin "$ref"
              git -C "$repo_dir" checkout -B "$ref" "origin/$ref"
            elif git -C "$repo_dir" rev-parse --verify --quiet "$ref^{commit}" >/dev/null; then
              git -C "$repo_dir" checkout --detach "$ref"
            else
              echo "Ref '$ref' nao encontrada em $(basename "$repo_dir"). Usando '$default_branch'."
              git -C "$repo_dir" fetch origin "$default_branch"
              git -C "$repo_dir" checkout -B "$default_branch" "origin/$default_branch"
            fi
          }

          TARGET_REF="$DEPLOY_REF_INPUT"
          if [ -z "$TARGET_REF" ]; then
            TARGET_REF="$DEFAULT_REF"
          fi

          echo "Ambiente: $TARGET_ENV"
          echo "Acao: deploy"
          echo "Ref: $TARGET_REF"

          checkout_ref "$BACKEND_DIR" "$TARGET_REF"
          checkout_ref "$FRONTEND_DIR" "$TARGET_REF"

          bash "$BACKEND_DIR/scripts/deploy/deploy-target.sh" "$TARGET_ENV" "$BACKEND_DIR"

  rollback:
    name: Rollback (Staging/Production)
    runs-on:
      - self-hosted
      - macOS
      - deploy
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    environment: ${{ github.event.inputs.target }}
    env:
      DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
      ROLLBACK_REF_INPUT: ${{ github.event.inputs.rollback_ref }}
      TARGET_ENV: ${{ github.event.inputs.target }}
      MSSQL_SA_PASSWORD_SECRET: ${{ secrets.MSSQL_SA_PASSWORD }}
      JWT_KEY_SECRET: ${{ secrets.JWT_KEY }}

    steps:
      - name: Validate rollback inputs
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_ROOT:-}" ]; then
            echo "Secret DEPLOY_ROOT nao configurado."
            exit 1
          fi
          if [ -z "${MSSQL_SA_PASSWORD_SECRET:-}" ]; then
            echo "Secret MSSQL_SA_PASSWORD nao configurado."
            exit 1
          fi
          if [ -z "${JWT_KEY_SECRET:-}" ]; then
            echo "Secret JWT_KEY nao configurado."
            exit 1
          fi

          if [ -z "${ROLLBACK_REF_INPUT:-}" ]; then
            echo "rollback_ref e obrigatorio para rollback."
            exit 1
          fi

      - name: Rollback repositories and redeploy
        run: |
          set -euo pipefail

          if [ -n "${MSSQL_SA_PASSWORD_SECRET:-}" ]; then
            export MSSQL_SA_PASSWORD="$MSSQL_SA_PASSWORD_SECRET"
          fi
          if [ -n "${JWT_KEY_SECRET:-}" ]; then
            export JWT_KEY="$JWT_KEY_SECRET"
          fi

          BACKEND_DIR="$DEPLOY_ROOT/PlanWriter"
          FRONTEND_DIR="$DEPLOY_ROOT/PlanWriter-Frontend"

          if [ ! -d "$BACKEND_DIR/.git" ]; then
            echo "Repositorio backend nao encontrado em: $BACKEND_DIR"
            exit 1
          fi

          if [ ! -d "$FRONTEND_DIR/.git" ]; then
            echo "Repositorio frontend nao encontrado em: $FRONTEND_DIR"
            exit 1
          fi

          checkout_ref() {
            local repo_dir="$1"
            local ref="$2"

            git -C "$repo_dir" fetch --all --tags --prune

            local default_branch
            default_branch="$(git -C "$repo_dir" symbolic-ref --quiet --short refs/remotes/origin/HEAD | sed 's#^origin/##')"
            if [ -z "$default_branch" ]; then
              default_branch="main"
            fi

            if git -C "$repo_dir" show-ref --verify --quiet "refs/remotes/origin/$ref"; then
              git -C "$repo_dir" fetch origin "$ref"
              git -C "$repo_dir" checkout -B "$ref" "origin/$ref"
            elif git -C "$repo_dir" rev-parse --verify --quiet "$ref^{commit}" >/dev/null; then
              git -C "$repo_dir" checkout --detach "$ref"
            else
              echo "Ref '$ref' nao encontrada em $(basename "$repo_dir"). Usando '$default_branch'."
              git -C "$repo_dir" fetch origin "$default_branch"
              git -C "$repo_dir" checkout -B "$default_branch" "origin/$default_branch"
            fi
          }

          TARGET_REF="$ROLLBACK_REF_INPUT"

          echo "Ambiente: $TARGET_ENV"
          echo "Acao: rollback"
          echo "Ref: $TARGET_REF"

          checkout_ref "$BACKEND_DIR" "$TARGET_REF"
          checkout_ref "$FRONTEND_DIR" "$TARGET_REF"

          bash "$BACKEND_DIR/scripts/deploy/deploy-target.sh" "$TARGET_ENV" "$BACKEND_DIR"
